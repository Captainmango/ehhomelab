apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: victoria-metrics
    app.kubernetes.io/version: 13.1.0
  name: grafana-config-dashboards
  namespace: monitoring
data:
  provider.yaml: "apiVersion: 1\nproviders:\n  - name: 'default'\n    orgId: 1\n \
    \   folder: ''\n    folderUid: ''\n    type: file\n    disableDeletion: false\n\
    \    allowUiUpdates: false\n    updateIntervalSeconds: 30\n    options:\n    \
    \  foldersFromFilesStructure: false\n      path: /var/lib/grafana/dashboards/default"
