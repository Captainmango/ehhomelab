apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: victoria-metrics
    app.kubernetes.io/version: 13.1.0
data:
  grafana.ini: |
    [analytics]
    check_for_updates = true

    [log]
    mode = console

    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning

    [server]
    domain = grafana.eheaver.cloud
    root_url = https://grafana.eheaver.cloud/
    serve_from_sub_path = false

    [unified_storage]
    index_path = /var/lib/grafana-search/bleve

    [auth.generic_oauth]
    enabled = true
    auto_login = false
    allow_assign_grafana_admin = true
    name = Authelia
    icon = signin
    client_id = grafana
    client_secret = 8vM1qBaTbeCfqLcmTzbediaaqLSPexqTBuJ8lkjg54VOqJ0J2f9Ni547q8nMCnbZ
    scopes = openid profile email groups
    empty_scopes = false
    auth_url = https://auth.eheaver.cloud/api/oidc/authorization
    token_url = https://auth.eheaver.cloud/api/oidc/token
    api_url = https://auth.eheaver.cloud/api/oidc/userinfo
    login_attribute_path = preferred_username
    groups_attribute_path = groups
    name_attribute_path = name
    use_pkce = true
    role_attribute_path = contains(groups[*], 'admins') && 'GrafanaAdmin' || contains(groups[*], 'dev') && 'Admin' || 'Viewer'
    auth_style = InHeader
