apiVersion: batch/v1
kind: Job
metadata:
  name: victoria-metrics-k8s-stack-sync-job
  namespace: monitoring
  labels:
    app.kubernetes.io/component: syncJob
    app.kubernetes.io/instance: victoria-metrics
    app.kubernetes.io/name: victoria-metrics-k8s-stack
    app.kubernetes.io/version: v0.0.11
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: syncJob
        app.kubernetes.io/instance: victoria-metrics
        app.kubernetes.io/name: victoria-metrics-k8s-stack
        app.kubernetes.io/version: v0.0.11
    spec:
      serviceAccountName: victoria-metrics-k8s-stack-sync-job
      restartPolicy: OnFailure
      containers:
      - name: sync-job
        image: ghcr.io/victoriametrics/sync-job:v0.0.11
        imagePullPolicy: IfNotPresent
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: RELEASE
          value: victoria-metrics
        - name: RESOURCE_PREFIX
          value: victoria-metrics-k8s-stack
        - name: PRUNE
          value: 'true'
        - name: OWNER_REFERENCES
          value: 'true'
        - name: SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        volumeMounts:
        - name: config
          mountPath: /etc/config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: victoria-metrics-k8s-stack-sync-job-config
