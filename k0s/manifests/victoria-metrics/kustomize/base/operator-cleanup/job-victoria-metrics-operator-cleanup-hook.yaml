apiVersion: batch/v1
kind: Job
metadata:
  name: victoria-metrics-operator-cleanup-hook
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: victoria-metrics
    app.kubernetes.io/name: victoria-metrics-operator
    app.kubernetes.io/version: v0.73.1
spec:
  template:
    metadata:
      name: victoria-metrics-operator
      labels:
        app.kubernetes.io/instance: victoria-metrics
        app.kubernetes.io/name: victoria-metrics-operator
        app.kubernetes.io/version: v0.73.1
    spec:
      serviceAccountName: victoria-metrics-operator-cleanup-hook
      containers:
      - name: kubectl
        image: registry.k8s.io/kubectl:v1.36.0
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 56Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        command:
        - kubectl
        args:
        - delete
        - vlagent,vlcluster,vlogs,vlsingle,vmagent,vmalert,vmalertmanager,vmalertmanagerconfig,vmanomaly,vmanomalyconfig,vmauth,vmcluster,vmdistributed,vmnodescrape,vmpodscrape,vmprobe,vmrule,vmscrapeconfig,vmservicescrape,vmsingle,vmstaticscrape,vmuser,vtcluster,vtsingle
        - --all
        - --ignore-not-found=true
      restartPolicy: OnFailure
